name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: arch-query-linux-amd64
          - goos: linux
            goarch: arm64
            name: arch-query-linux-arm64
          - goos: darwin
            goarch: amd64
            name: arch-query-darwin-amd64
          - goos: darwin
            goarch: arm64
            name: arch-query-darwin-arm64

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/arch-query/go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Stage embedded data
        working-directory: src/arch-query
        run: |
          rm -rf _embedded/architecture
          mkdir -p _embedded/architecture
          for d in ../../architecture/*/; do
            name=$(basename "$d")
            if [ ! -L "../../architecture/$name" ]; then
              mkdir -p "_embedded/architecture/$name"
              find "$d" -maxdepth 1 -name '*.md' -exec cp {} "_embedded/architecture/$name/" \;
            fi
          done
          python3 -c "import os,json; d='../../architecture'; \
            print(json.dumps({e:os.readlink(os.path.join(d,e)) \
            for e in sorted(os.listdir(d)) if os.path.islink(os.path.join(d,e))}))" \
            > _embedded/architecture/symlinks.json
          if [ -d "../../overlays" ]; then
            cp -r "../../overlays" _embedded/architecture/overlays
          fi

      - name: Build
        working-directory: src/arch-query
        run: go build -tags embedded -o ../../${{ matrix.name }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
