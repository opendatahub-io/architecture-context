name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Lint Python
        run: make lint-python

  lint-overlays:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Lint overlays
        run: make lint-overlays

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/arch-query/go.mod

      - name: Lint Go
        run: make lint-go

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/arch-query/go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build embedded binary
        run: make build-embedded

      - name: Smoke test
        run: make -C src/arch-query smoke-embedded
