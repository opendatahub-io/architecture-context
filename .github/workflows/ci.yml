name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-architecture-changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for architecture/ changes
        run: |
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- architecture/)
          if [ -n "$changed" ]; then
            echo "::error::PRs must not modify files in architecture/ — these are autogenerated."
            echo ""
            echo "Changed files:"
            echo "$changed"
            echo ""
            echo "To change architecture output, use overlays, platforms.yaml, or update the pipeline code."
            exit 1
          fi

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Lint Python
        run: make lint-python

  lint-overlays:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Lint overlays
        run: make lint-overlays

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/arch-query/go.mod

      - name: Lint Go
        run: make lint-go

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/arch-query/go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build embedded binary
        run: make build-embedded

      - name: Smoke test
        run: make -C src/arch-query smoke-embedded
