kubernetes:
  suffix: head
  orgs:
    - kubernetes
  exclude_repos:
    - "*/test-infra"
    - "*/website"
    - "*.github.io"

openshift:
  suffix: head
  orgs:
    - openshift
  exclude_repos:
    - "*/openshift-origin-design"
    - "*/test-infra"

  # Fix type misclassifications
  component_overrides:
    openshift-state-metrics:
      type: service
    console-operator:
      type: operator
    # Fix tier misclassifications — these are core, not optional
    cluster-ingress-operator:
      tier: core_platform
    cluster-storage-operator:
      tier: core_platform
    cluster-image-registry-operator:
      tier: core_platform
    cloud-credential-operator:
      tier: core_platform
    # IBM-specific CSI driver is not core
    ibm-vpc-block-csi-driver-operator:
      tier: optional_platform

  # Go libraries — not deployed components, skip architecture generation
  exclude_components:
    - build-machinery-go
    - custom-resource-status
    - controller-runtime-common
    - runtime-utils

  # Components discovery missed
  include_components:
    - key: oc
      repo_org: openshift
      repo_name: oc
      type: cli
