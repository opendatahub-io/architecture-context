## Platform definitions for the architecture context pipeline.
##
## Each top-level key is a platform identifier used by the fetch,
## discover-components, and generate-architecture subcommands.
##
## Fields:
##   suffix            - directory suffix for checkouts (e.g., <org>.<suffix>/)
##   branch            - specific branch to clone (skips repos without it)
##   version           - human-readable version string for PLATFORM.md metadata
##                       (optional; defaults to branch name, then directory name)
##   orgs              - primary GitHub orgs to clone (list of strings)
##   extra_orgs        - additional orgs (list of {org, branch?, suffix?})
##   extra_repos       - individual cross-org repos (list of {org, repo, branch?, suffix?, protocol?})
##   exclude_repos     - repos to skip during fetch (supports globs)
##
## Component map override fields (applied after discovery):
##   component_overrides  - fix fields on discovered components (keyed by component key)
##   exclude_components   - remove components from the map (supports globs)
##   include_components   - add components not found by discovery
##
## Post-checkout cleanup (remove sensitive files before architecture analysis):
##   post_checkout         - platform-wide rules (list of {repo, exclude_files})
##                           repo supports glob patterns via fnmatch
##
## Per extra_repos entry:
##   exclude_files         - files/dirs to delete after cloning (list of glob patterns)
##
## Use YAML anchors (&name / *name) to share config across entries.

_rhoai_common: &rhoai_common
  orgs:
    - red-hat-data-services
  extra_repos:
    - org: project-codeflare
      repo: codeflare-sdk
  exclude_repos:
    - "*-docs"
    - "*-design"
    - "*/test-infra"
  exclude_components:
    - opendatahub-operator
  post_checkout:
    - repo: models-perf-benchmark-data
      exclude_files:
        - "data/"

_rhoai_3x_common: &rhoai_3x_common
  <<: *rhoai_common
  extra_orgs:
    - org: llm-d
  extra_repos:
    - org: project-codeflare
      repo: codeflare-sdk
    - org: red-hat-data-services
      repo: models-perf-benchmark-data
      protocol: ssh
      exclude_files:
        - "data/"

odh:
  suffix: head
  orgs:
    - opendatahub-io
  extra_orgs:
    - org: llm-d
  extra_repos:
    - org: project-codeflare
      repo: codeflare-sdk
    - org: IBM
      repo: ai4rag
  exclude_repos:
    - "*-docs"
    - "*-design"
    - "*/test-infra"
  include_components:
    - key: ai4rag
      repo_org: IBM
      repo_name: ai4rag
      type: library

